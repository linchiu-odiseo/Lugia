server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # index.html y service worker: nunca cacheados (asi los clientes ven nuevos deploys)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
  location = /ngsw.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
  location = /ngsw-worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }
  location = /safety-worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # Assets con hash en el nombre: cache largo + immutable
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|webp|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
    try_files $uri =404;
  }

  # SPA fallback: cualquier ruta no resuelta cae a index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
