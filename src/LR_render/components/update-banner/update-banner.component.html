@if (pendingUpdate().available) {
  <button type="button" class="banner banner--update" (click)="tap.emit()">
    <span class="material-symbols-outlined banner__icon" aria-hidden="true">system_update</span>
    <span class="banner__text">Hay una versión nueva — Toca para actualizar</span>
    <span class="material-symbols-outlined banner__chevron" aria-hidden="true">chevron_right</span>
  </button>
}
