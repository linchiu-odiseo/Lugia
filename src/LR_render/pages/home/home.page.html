<main class="home">
  <header>
    <h1>NeonPanda</h1>
    @if (email(); as e) {
      <p class="greeting">Hola, {{ e }}</p>
    }
  </header>

  <section class="placeholder">
    <p>Fase 1 lista. La cartilla de marcaciones llega en Fase 2.</p>
  </section>

  <footer>
    <button type="button" (click)="signOut()" [disabled]="isSigningOut()">
      @if (isSigningOut()) {
        Cerrando…
      } @else {
        Cerrar sesión
      }
    </button>
  </footer>
</main>
