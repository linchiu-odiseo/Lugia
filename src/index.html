<!doctype html>
<html lang="es-PE" translate="no">
  <head>
    <meta charset="utf-8" />
    <title>NeonPanda</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <!--
      Bloquea auto-traducción del navegador (Chrome Android principalmente):
      sin esto, traductores agresivos convierten letras sueltas "A B C D E"
      de las bubbles del simulacro en notas de solfeo ("do", "mi", "re") y
      rompen la cartilla. `translate="no"` en <html> cubre todo el árbol DOM;
      la meta `google content="notranslate"` además suprime el banner
      "¿Traducir esta página?" específico de Chrome.
    -->
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#0b0f17" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NeonPanda" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <!--
      Content Security Policy.
      Defensa contra XSS roba-bearer (design D4): cualquier script inyectado
      no podrá emitir requests a hosts arbitrarios, solo a 'self' (la propia
      PWA) y al backend explícitamente listado en `connect-src`.

      El origin del backend en `connect-src` lo MANTIENE SINCRONIZADO el
      script `scripts/build-env.mjs` con `API_BASE_URL` del `.env`. NO editar
      a mano: el próximo `npm run dev`/`build`/`test` lo va a reescribir.

      PROD: este meta CSP queda incluido en el bundle. Si el server que
      sirve la PWA en producción además inyecta un CSP via HTTP header, ese
      header gana — útil para directivas más estrictas que requieran nonce.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://least-elevation-pressed-aside.trycloudflare.com; img-src 'self' data:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
