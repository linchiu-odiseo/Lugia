<!doctype html>
<html lang="es-PE" translate="no">
  <head>
    <meta charset="utf-8" />
    <title>Lugia</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <!--
      Bloquea auto-traducción del navegador (Chrome Android principalmente):
      sin esto, traductores agresivos convierten letras sueltas "A B C D E"
      de las bubbles del simulacro en notas de solfeo ("do", "mi", "re") y
      rompen la cartilla. `translate="no"` en <html> cubre todo el árbol DOM;
      la meta `google content="notranslate"` además suprime el banner
      "¿Traducir esta página?" específico de Chrome.
    -->
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#fcf9f8" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lugia" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <!--
      Content Security Policy.
      Defensa contra XSS roba-bearer (design D4): cualquier script inyectado
      no podrá emitir requests a hosts arbitrarios, solo a 'self' (la propia
      PWA) y al backend explícitamente listado en `connect-src`.

      El origin del backend en `connect-src` lo MANTIENE SINCRONIZADO el
      script `scripts/build-env.mjs` con `API_BASE_URL` del `.env`. NO editar
      a mano: el próximo `npm run dev`/`build`/`test` lo va a reescribir.

      PROD: este meta CSP queda incluido en el bundle. Si el server que
      sirve la PWA en producción además inyecta un CSP via HTTP header, ese
      header gana — útil para directivas más estrictas que requieran nonce.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://measurement-conventions-entertaining-publicity.trycloudflare.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <!--
      Tipografía del design system Native Excellence — se carga desde Google
      Fonts vía CSP allowlist (style-src incluye fonts.googleapis.com, font-src
      incluye fonts.gstatic.com). `display=swap` evita FOIT bloqueante en
      conexiones lentas; el fallback de var(--font-body) cubre el primer paint.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Press+Start+2P&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    />
    <!--
      Iconos:
      - favicon.ico para la pestaña del navegador (32x32 por ahora; pendiente
        regenerarlo como multi-resolución 16/32/48).
      - maskable_icon_x180.png como apple-touch-icon (home screen iOS — iOS
        ignora el manifest, necesita este link explícito).
      - El resto de maskable_icon_*.png los referencia `public/manifest.json`
        para Android home screen / install dialog / task switcher.
    -->
    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="maskable_icon_x180.png" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
