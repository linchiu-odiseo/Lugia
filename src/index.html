<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>NeonPanda</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0b0f17" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NeonPanda" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <!--
      Content Security Policy (Fase 1, dev).
      Defensa contra XSS roba-bearer (design D4): cualquier script inyectado
      no podrá emitir requests a hosts arbitrarios, solo a 'self' (la propia
      PWA) y al backend de API-FAKE explícitamente listado.
      PROD: el CSP de producción debe enviarse como HTTP header desde el
      servidor que sirve el bundle (con el `connect-src` apuntando al backend
      productivo), o reescribirse vía Angular fileReplacements en build.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:2004; img-src 'self' data:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
